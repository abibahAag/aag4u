org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC -Dfile.encoding=UTF-8
# Kotlin incremental + pub on C: and project on D: breaks RelocatableFileToPathConverter on Windows
kotlin.incremental=false
# Avoid separate Kotlin compile daemon (reduces RAM + fixes daemon killed on low-memory Windows)
kotlin.compiler.execution.strategy=in-process
android.useAndroidX=true
# Jetifier is very memory-heavy on large dependency graphs; most modern Flutter plugins are AndroidX already.
android.enableJetifier=false
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.daemon=true
kotlin.daemon.jvmargs=-Xmx1024m
